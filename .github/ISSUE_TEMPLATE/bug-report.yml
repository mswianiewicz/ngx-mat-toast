name: Bug report
description: Report a reproducible bug in ngx-mat-toast
title: '[Bug]: '
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.
  - type: input
    id: angular-version
    attributes:
      label: Angular version
      placeholder: e.g. 22.0.0
    validations:
      required: true
  - type: input
    id: package-version
    attributes:
      label: ngx-mat-toast version
      placeholder: e.g. 1.0.0
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide a minimal reproduction if possible.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      render: shell
